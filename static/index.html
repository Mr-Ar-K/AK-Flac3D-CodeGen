<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLAC3D Mesh Compiler</title>
  
  <style>
    :root {
      color-scheme: dark;
      --bg0: #06111b; --bg1: #0a1724;
      --panel: rgba(10, 20, 32, 0.86); --panel-strong: rgba(14, 27, 43, 0.94);
      --text: #edf4fb; --muted: #9bb0c5; --line: rgba(140, 180, 220, 0.18);
      --accent: #6fd2ff; --accent-2: #76f0c3;
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.42); --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      background: linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      color: var(--text); font-family: "Segoe UI", Arial, sans-serif;
    }
    body { padding: 20px; }
    button, input { font: inherit; }
    button {
      border: 1px solid rgba(160, 198, 230, 0.2);
      background: linear-gradient(180deg, rgba(22, 39, 58, 0.96), rgba(14, 26, 40, 0.96));
      color: var(--text); border-radius: 12px; padding: 10px 14px; cursor: pointer;
    }
    button.primary {
      background: linear-gradient(180deg, rgba(74, 173, 220, 0.96), rgba(35, 102, 149, 0.96));
      border-color: rgba(111, 210, 255, 0.82); color: white;
    }
    .header {
      padding: 22px 24px; border: 1px solid var(--line); border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(8, 18, 30, 0.94), rgba(17, 29, 45, 0.9));
      margin-bottom: 18px;
    }
    h1, h2 { margin: 0; line-height: 1.15; }
    .container { display: grid; grid-template-columns: minmax(340px, 450px) minmax(0, 1fr); gap: 18px; }
    .panel {
      border: 1px solid var(--line); border-radius: var(--radius);
      background: var(--panel); padding: 18px; display: flex; flex-direction: column;
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    input[type="number"], input[type="file"] {
      width: 100%; border-radius: 12px; border: 1px solid rgba(148, 177, 209, 0.22);
      background: rgba(4, 12, 20, 0.72); color: var(--text); padding: 12px 13px; margin-bottom: 14px;
    }
    .status { padding: 10px; border-radius: 12px; margin-top: 12px; display: none; }
    .status.success { display: block; border: 1px solid rgba(118, 240, 195, 0.55); color: #d9fff1; }
    .status.error { display: block; border: 1px solid rgba(255, 125, 125, 0.55); color: #ffc8c8; }
    .output-box {
      background: rgba(4, 12, 20, 0.78); border: 1px solid rgba(148, 177, 209, 0.12);
      border-radius: 12px; padding: 14px; color: #dce8f4; flex-grow: 1; max-height: 700px;
      overflow-y: auto; font-family: "Courier New", monospace; white-space: pre;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>FLAC3D Mesh Compiler (Integrated API)</h1>
    <p style="color: var(--muted); margin-top: 8px;">Upload a DXF file to automatically decompose geometries into Bricks and Wedges.</p>
  </header>

  <div class="container">
    <div class="panel">
      <h2>1. Input Parameters</h2>
      <label style="margin: 12px 0 6px; display: block;">Y-Axis Extrusion Depth (Thickness)</label>
      <input type="number" id="yDepthInput" value="1.0" step="0.1">

      <label style="margin: 12px 0 6px; display: block;">DXF Drawing File</label>
      <input type="file" id="dxfUpload" accept=".dxf">

      <button type="button" class="primary" onclick="processDXF()">Upload & Compile</button>
      <div id="statusDiv" class="status"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>2. Compiled FISH Code</h2>
        <button type="button" onclick="copyCode()">Copy</button>
      </div>
      <div id="outputBox" class="output-box">Upload a file to generate code...</div>
    </div>
  </div>

  <script>
    function formatNum(value) { return value.toFixed(4).replace(/\.0+$/, '').replace(/(\.\d*?)0+$/, '$1'); }
    function pad(str, len = 42) { return str.padEnd(len, ' '); }
    function point3(x, y, z) { return `(${formatNum(x)}, ${formatNum(y)}, ${formatNum(z)})`; }

    function showStatus(msg, isError) {
      const el = document.getElementById('statusDiv');
      el.textContent = msg;
      el.className = 'status ' + (isError ? 'error' : 'success');
    }

    function copyCode() {
      navigator.clipboard.writeText(document.getElementById('outputBox').textContent);
      showStatus("Copied to clipboard!", false);
    }

    async function processDXF() {
      const fileInput = document.getElementById('dxfUpload');
      const yDepth = parseFloat(document.getElementById('yDepthInput').value);

      if (!fileInput.files[0]) return showStatus("Please select a DXF file first.", true);
      if (isNaN(yDepth) || yDepth <= 0) return showStatus("Invalid Y Depth.", true);

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      showStatus("Uploading and processing...", false);
      
      try {
        const response = await fetch('/api/process-dxf', { method: 'POST', body: formData });
        const data = await response.json();

        if (data.error) throw new Error(data.error);

        generateFlacCode(data.elements, yDepth);
      } catch (err) {
        showStatus(err.message, true);
      }
    }

    function generateFlacCode(elements, yDepth) {
      const output = ['model new', 'model largestrain off', '', '; --- Block Definitions ---'];
      let blockId = 1, slopeId = 1;

      elements.forEach(el => {
        if (el.type === 'Rectangle' || el.type === 'Square') {
          let xVals = el.coordinates.map(p => p[0]);
          let zVals = el.coordinates.map(p => p[1]);
          let xmin = Math.min(...xVals), xmax = Math.max(...xVals);
          let zmin = Math.min(...zVals), zmax = Math.max(...zVals);

          output.push(pad('zone create brick') + '...');
          output.push(pad(`    point 0 ${point3(xmin, 0, zmin)}`) + '...');
          output.push(pad(`    point 1 ${point3(xmax, 0, zmin)}`) + '...');
          output.push(pad(`    point 2 ${point3(xmin, yDepth, zmin)}`) + '...');
          output.push(pad(`    point 3 ${point3(xmin, 0, zmax)}`) + '...');
          output.push(`    size (1,1,1) group 'block_${blockId++}'\n`);
        } 
        else if (el.type === 'Right Triangle') {
          const pts = el.coordinates;
          let C, p1, p2;
          
          for(let i=0; i<3; i++) {
            let a = pts[i], b = pts[(i+1)%3], c = pts[(i+2)%3];
            if ((Math.abs(a[0]-b[0]) < 1e-4 && Math.abs(a[1]-c[1]) < 1e-4) ||
                (Math.abs(a[0]-c[0]) < 1e-4 && Math.abs(a[1]-b[1]) < 1e-4)) {
              C = a; p1 = b; p2 = c; break;
            }
          }

          if(C && p1 && p2) {
            let px = (Math.abs(p1[1] - C[1]) < 1e-4) ? p1 : p2;
            let pz = (Math.abs(p1[0] - C[0]) < 1e-4) ? p1 : p2;

            let dx = px[0] - C[0], dz = pz[1] - C[1];
            let P0 = [C[0], 0, C[1]], P2 = [C[0], yDepth, C[1]];
            let P1, P3, P4, P5;

            if (dx * dz > 0) {
              P1 = [px[0], 0, px[1]]; P3 = [pz[0], 0, pz[1]];
              P4 = [px[0], yDepth, px[1]]; P5 = [pz[0], yDepth, pz[1]];
            } else {
              P1 = [pz[0], 0, pz[1]]; P3 = [px[0], 0, px[0]];
              P4 = [pz[0], yDepth, pz[1]]; P5 = [px[0], yDepth, px[1]];
            }

            output.push(pad('zone create uniform-wedge') + '...');
            output.push(pad(`    point 0 ${point3(...P0)}`) + '...');
            output.push(pad(`    point 1 ${point3(...P1)}`) + '...');
            output.push(pad(`    point 2 ${point3(...P2)}`) + '...');
            output.push(pad(`    point 3 ${point3(...P3)}`) + '...');
            output.push(pad(`    point 4 ${point3(...P4)}`) + '...');
            output.push(pad(`    point 5 ${point3(...P5)}`) + '...');
            output.push(`    size (1,1,1) group 'slope_${slopeId++}'\n`);
          }
        }
      });

      output.push('; --- Unify and Merge Nodes ---');
      output.push('zone gridpoint merge');
      
      document.getElementById('outputBox').textContent = output.join('\n');
      showStatus(`Compiled ${blockId-1} Rectangles and ${slopeId-1} Triangles.`, false);
    }
  </script>
</body>
</html>
